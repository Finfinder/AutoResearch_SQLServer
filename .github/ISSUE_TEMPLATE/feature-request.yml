name: Feature Request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem or workflow gap you want to improve.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - sql
        - benchmarking
        - guardrails
        - cli
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or notes
      description: Add performance, safety, or SQL Server constraints if they matter.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for existing issues before opening this request.
          required: true
